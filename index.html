<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quran AI</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <div id="chat-screen">
    <header>
      <div class="logo">☪ Quran AI</div>
      <div class="tagline">Timeless guidance from the Holy Quran</div>
    </header>

    <div id="chat-window">
      <div class="welcome-msg">
        <p>Assalamu Alaikum — Welcome to Quran AI</p>
        <p>Ask your questions and receive guidance derived solely from the Holy Book Al-Quran.</p>
      </div>
    </div>

    <div id="input-area">
      <textarea id="user-input" placeholder="Ask your question..." rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="quran.js"></script>
  <script src="gemini.js"></script>
  <script src="app.js"></script>
</body>
</html>
