<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quran AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="chat-screen" class="screen">
    <header>
      <span class="logo">☪ Quran AI</span>
    </header>

    <div id="chat-window">
      <div class="welcome-msg">
        <p>Assalamu Alaikum<br>Welcome to Quran AI<br><br>Your companion for timeless divine guidance.<br>Ask your questions and receive guidance<br>derived solely from the Holy Book Al-Quran.</p>
      </div>
    </div>

    <div id="input-area">
      <textarea id="user-input" placeholder="Ask your question..." rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="quran.js"></script>
  <script src="gemini.js"></script>
  <script src="app.js"></script>
</body>
</html>
